name: Feature request
description: Suggest a new section type, lint check, template, or workflow improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you unable to do today, or what is painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Your proposed change
      description: Keep it small and aligned with the file-first, config-driven philosophy.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
